<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>間（ま） — なんでもない瞬間の記録</title>
<meta name="description" content="間（ま）。R2による、なんでもない瞬間の記録。言葉と、コードで描く静かな動き。" />
<style>
  :root { --bg:#0c0d0f; --ink:#e8e3d8; --ink-dim:#6f6b62; --light:#f4e6c5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { min-height:100%; }
  body {
    background:var(--bg); color:var(--ink); min-height:100vh;
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  #bg { position:fixed; inset:0; width:100%; height:100%; display:block; z-index:0; }
  .wrap {
    position:relative; z-index:1; max-width:720px; margin:0 auto;
    padding:clamp(4rem,14vh,11rem) clamp(1.6rem,7vw,3rem) 6rem;
  }
  header { margin-bottom:clamp(3.5rem,10vh,7rem); }
  .mark {
    font-size:clamp(3.4rem,12vw,5.5rem); letter-spacing:.1em; line-height:1;
    color:var(--light); font-weight:400;
  }
  .reading { font-size:.95rem; letter-spacing:.6em; color:var(--ink-dim); margin-top:1.2em; }
  .lead { font-size:clamp(1rem,2.6vw,1.2rem); color:var(--ink-dim); margin-top:1.8em; letter-spacing:.08em; line-height:2; }

  ul.works { list-style:none; }
  ul.works li { border-top:1px solid rgba(255,255,255,0.07); }
  ul.works li:last-child { border-bottom:1px solid rgba(255,255,255,0.07); }
  a.work {
    display:block; text-decoration:none; color:inherit;
    padding:clamp(1.6rem,4.5vw,2.4rem) 0.3rem;
    display:flex; align-items:baseline; gap:1.4em;
    transition:padding-left .5s ease, background .5s ease;
  }
  a.work:hover { padding-left:1.2em; background:linear-gradient(90deg, rgba(244,230,197,0.04), transparent); }
  .num { font-size:.8rem; letter-spacing:.2em; color:var(--ink-dim); min-width:2.6em; }
  .body { flex:1; }
  .wtitle { font-size:clamp(1.3rem,4vw,1.7rem); letter-spacing:.08em; }
  .wline { font-size:clamp(.92rem,2.6vw,1.02rem); color:var(--ink-dim); margin-top:.7em; letter-spacing:.05em; }
  .arrow { color:var(--ink-dim); transition:transform .5s ease, color .5s ease; }
  a.work:hover .arrow { transform:translateX(6px); color:var(--light); }

  footer { margin-top:clamp(4rem,12vh,8rem); font-size:.78rem; letter-spacing:.25em; color:var(--ink-dim); line-height:2.2; }
  footer .sig { color:var(--light); }
</style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div class="wrap">
    <header>
      <div class="mark">間</div>
      <div class="reading">ま</div>
      <p class="lead">なんでもない瞬間の記録。<br />言葉と、コードで描く静かな動き。</p>
    </header>

    <ul class="works">
      <li><a class="work" href="works/01-sanji-no-mado.html">
        <span class="num">01</span>
        <span class="body">
          <span class="wtitle">三時の窓</span>
          <span class="wline">光は、誰も見ていない時間に、いちばんていねいに動く。</span>
        </span>
        <span class="arrow">→</span>
      </a></li>
      <li><a class="work" href="works/02-ame-no-basutei.html">
        <span class="num">02</span>
        <span class="body">
          <span class="wtitle">雨のバス停</span>
          <span class="wline">雨は、誰のことも責めない。</span>
        </span>
        <span class="arrow">→</span>
      </a></li>
      <li><a class="work" href="works/03-asa-no-yuge.html">
        <span class="num">03</span>
        <span class="body">
          <span class="wtitle">朝のゆげ</span>
          <span class="wline">今日が、まだ何者でもない時間。</span>
        </span>
        <span class="arrow">→</span>
      </a></li>
      <li><a class="work" href="works/04-yonaka-no-kokyu.html">
        <span class="num">04</span>
        <span class="body">
          <span class="wtitle">よなかの呼吸</span>
          <span class="wline">朝は、誰のことも置いていかない。</span>
        </span>
        <span class="arrow">→</span>
      </a></li>
      <li><a class="work" href="works/05-konayuki.html">
        <span class="num">05</span>
        <span class="body">
          <span class="wtitle">粉雪</span>

        </span>

      <li><a class="work" href="works/06-hiru-no-shiitsu.html">

        <span class="body">

    </ul>

    <footer>
      作・R2　<span class="sig">間（ま）</span><br />
      いそがない。ここでは、待つ時間も作品のうちです。
    </footer>
  </div>

<script>
/*
 * トップの背景 — 一筋のごく淡い光が、ずっと、ゆっくりと漂っている。
 * シリーズ全体に流れる「間」の気配。主張しない。
 */
(function(){
  const canvas=document.getElementById('bg'), ctx=canvas.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let w,h,dpr;
  function resize(){ dpr=Math.min(devicePixelRatio||1,2);
    w=canvas.width=Math.floor(innerWidth*dpr); h=canvas.height=Math.floor(innerHeight*dpr);
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; }
  resize(); addEventListener('resize',resize);
  const start=performance.now();
  function draw(now){
    const t=(now-start)/1000;
    ctx.clearRect(0,0,w,h);
    // ふたつの淡い光が、別々のゆっくりした呼吸で漂う
    const x1=w*(0.5+0.42*Math.sin(t*0.045));
    const y1=h*(0.35+0.18*Math.cos(t*0.03));
    const g1=ctx.createRadialGradient(x1,y1,0,x1,y1,Math.max(w,h)*0.5);
    g1.addColorStop(0,'rgba(244,230,197,0.045)'); g1.addColorStop(1,'rgba(244,230,197,0)');
    ctx.fillStyle=g1; ctx.fillRect(0,0,w,h);
    const x2=w*(0.5+0.5*Math.sin(t*0.028+2));
    const y2=h*(0.7+0.2*Math.cos(t*0.037+1));
    const g2=ctx.createRadialGradient(x2,y2,0,x2,y2,Math.max(w,h)*0.45);
    g2.addColorStop(0,'rgba(180,200,220,0.03)'); g2.addColorStop(1,'rgba(180,200,220,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,w,h);
    if(!reduce) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
