<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>よなかの呼吸  — 間（ま）</title>
<meta name="description" content="間（ま）第四作『よなかの呼吸』。朝は、誰のことも置いていかない。" />
<style>
  :root { --bg:#070910; --ink:#dfe2ee; --ink-dim:#5b617a; --moon:#cdd6f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--ink); overflow:hidden;
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    -webkit-font-smoothing:antialiased;
  }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .poem {
    position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:center; align-items:flex-start; gap:1.25em;
    padding:clamp(2rem,9vw,9rem); pointer-events:none;
  }
  .poem .title { font-size:clamp(1rem,2.4vw,1.4rem); letter-spacing:.25em; color:var(--ink-dim); margin-bottom:1.5em; }
  .poem p {
    font-size:clamp(1.25rem,3.4vw,2.1rem); line-height:2.05; letter-spacing:.06em;
    opacity:0; transform:translateY(10px); animation:in 3s ease forwards;
  }
  .poem p:nth-of-type(1){animation-delay:1.4s;}
  .poem p:nth-of-type(2){animation-delay:3.4s;}
  .poem p:nth-of-type(3){animation-delay:5.4s;}
  .poem p:nth-of-type(4){animation-delay:7.4s;}
  @keyframes in { to { opacity:1; transform:translateY(0); } }
  nav.top { position:fixed; top:clamp(1.2rem,4vw,2.4rem); left:clamp(1.5rem,5vw,4rem); z-index:5; }
  nav.top a { color:var(--moon); text-decoration:none; font-size:1.1rem; letter-spacing:.3em; opacity:.7; transition:opacity .4s; }
  nav.top a:hover { opacity:1; }
  nav.bottom { position:fixed; right:clamp(1.5rem,5vw,4rem); bottom:clamp(1.5rem,5vw,3rem); display:flex; gap:2em; font-size:.8rem; letter-spacing:.25em; }
  nav.bottom a { color:var(--ink-dim); text-decoration:none; transition:color .4s; }
  nav.bottom a:hover { color:var(--ink); }

  /* 呼吸の手引き（小さく、画面の下に） */
  .guide {
    position:fixed; left:50%; bottom:clamp(4.5rem,12vw,7rem); transform:translateX(-50%);
    font-size:.82rem; letter-spacing:.35em; color:var(--ink-dim);
    pointer-events:none; transition:opacity 1.2s ease;
  }

  @media (prefers-reduced-motion:reduce){ .poem p{animation:none;opacity:1;transform:none;} .guide{display:none;} }
</style>
</head>
<body>
  <canvas id="c" aria-hidden="true"></canvas>
  <nav class="top"><a href="../index.html" title="間 のトップへ">間</a></nav>

  <div class="poem" role="article" aria-label="よなかの呼吸">
    <div class="title">第四作　よなかの呼吸</div>
    <p>眠れない夜は、ただ、息をしていればいい。</p>
    <p>ふくらんで、しぼんで、星もそうしている。</p>
    <p>時計の針より、ゆっくりでいい。</p>
    <p>朝は、誰のことも置いていかない。</p>
  </div>

  <div class="guide" id="guide">すって……はいて……</div>

  <nav class="bottom">
    <a href="03-asa-no-yuge.html">← 前の作品</a>
    <a href="05-konayuki.html">次の作品 →</a>
  </nav>

<script>
/*
 * よなかの呼吸 — 真ん中の淡い光が、おだやかに息をする。
 * 吸う4秒・とめる1秒・はく6秒。眠れない夜に、つられて呼吸を合わせられる速さで。
 * まわりには、かすかな星。光が「すう」とき、星もそっと明るむ。
 */
(function(){
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const guide=document.getElementById('guide');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let w,h,dpr,stars=[];
  function resize(){ dpr=Math.min(devicePixelRatio||1,2);
    w=canvas.width=Math.floor(innerWidth*dpr); h=canvas.height=Math.floor(innerHeight*dpr);
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
    makeStars();
  }
  function makeStars(){
    const n=Math.round((w*h)/(34000*dpr));
    stars=[];
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*w, y:Math.random()*h,
      r:(0.5+Math.random()*1.2)*dpr,
      base:0.08+Math.random()*0.22,
      ph:Math.random()*Math.PI*2
    });
  }
  resize(); addEventListener('resize',resize);

  // 呼吸のカーブ（0=しぼむ 1=ふくらむ）。吸う/止める/はく を非対称に。
  const INHALE=4, HOLD=1, EXHALE=6, CYCLE=INHALE+HOLD+EXHALE; // 11秒
  function breath(t){
    const p=((t % CYCLE)+CYCLE)%CYCLE;
    if(p<INHALE){ const k=p/INHALE; return 0.5-0.5*Math.cos(k*Math.PI); }      // すう
    if(p<INHALE+HOLD){ return 1; }                                             // とめる
    const k=(p-INHALE-HOLD)/EXHALE; return 0.5+0.5*Math.cos(k*Math.PI);        // はく
  }
  function label(t){
    const p=((t % CYCLE)+CYCLE)%CYCLE;
    if(p<INHALE) return 'すって……';
    if(p<INHALE+HOLD) return '……';
    return 'はいて……';
  }

  const start=performance.now();
  function draw(now){
    const t=(now-start)/1000;
    const b=breath(t); // 0..1
    ctx.clearRect(0,0,w,h);

    // 夜空のごく淡いむら
    const sky=ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'rgba(12,16,30,0.5)'); sky.addColorStop(1,'rgba(4,5,12,0.6)');
    ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);

    // 星（呼吸に合わせて、ほんのり明滅）
    for(const s of stars){
      const tw=0.6+0.4*Math.sin(t*0.7+s.ph);
      const a=s.base*tw*(0.7+0.5*b);
      ctx.fillStyle=`rgba(220,228,250,${a})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
    }

    // 真ん中の、息をする光
    const cx=w*0.5, cy=h*0.5;
    const R=Math.min(w,h)*(0.16+0.16*b);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    const core=0.10+0.10*b;
    g.addColorStop(0,`rgba(205,214,240,${core})`);
    g.addColorStop(0.5,`rgba(150,165,210,${core*0.45})`);
    g.addColorStop(1,'rgba(150,165,210,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.fill();

    // 呼吸の手引きの言葉を、静かに差し替える
    if(guide){ const l=label(t); if(guide.textContent!==l) guide.textContent=l; }

    if(!reduce) requestAnimationFrame(draw);
  }

  if(reduce){
    // 動きを止める設定なら、ふくらみきった光と星を1枚だけ
    const cx=w*0.5, cy=h*0.5, R=Math.min(w,h)*0.30;
    ctx.fillStyle='rgba(4,5,12,0.6)'; ctx.fillRect(0,0,w,h);
    for(const s of stars){ ctx.fillStyle=`rgba(220,228,250,${s.base})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); }
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    g.addColorStop(0,'rgba(205,214,240,0.18)'); g.addColorStop(.5,'rgba(150,165,210,0.08)'); g.addColorStop(1,'rgba(150,165,210,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.fill();
  } else requestAnimationFrame(draw);
})();
</script>
</body>
</html>
