<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>粉雪  — 間（ま）</title>
<meta name="description" content="間（ま）第五作『粉雪』。雪は、急ぐことを知らない。" />
<style>
  :root { --bg:#0a0c11; --ink:#e6e9f2; --ink-dim:#646b80; --snow:#eef2fb; --warm:#ffd9a3; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--ink); overflow:hidden;
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    -webkit-font-smoothing:antialiased;
  }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .poem {
    position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:center; align-items:flex-start; gap:1.25em;
    padding:clamp(2rem,9vw,9rem); pointer-events:none;
  }
  .poem .title { font-size:clamp(1rem,2.4vw,1.4rem); letter-spacing:.25em; color:var(--ink-dim); margin-bottom:1.5em; }
  .poem p {
    font-size:clamp(1.25rem,3.4vw,2.1rem); line-height:2.05; letter-spacing:.06em;
    opacity:0; transform:translateY(10px); animation:in 3s ease forwards;
  }
  .poem p:nth-of-type(1){animation-delay:1.2s;}
  .poem p:nth-of-type(2){animation-delay:3.2s;}
  .poem p:nth-of-type(3){animation-delay:5.2s;}
  .poem p:nth-of-type(4){animation-delay:7.2s;}
  @keyframes in { to { opacity:1; transform:translateY(0); } }
  nav.top { position:fixed; top:clamp(1.2rem,4vw,2.4rem); left:clamp(1.5rem,5vw,4rem); z-index:5; }
  nav.top a { color:var(--snow); text-decoration:none; font-size:1.1rem; letter-spacing:.3em; opacity:.7; transition:opacity .4s; }
  nav.top a:hover { opacity:1; }
  nav.bottom { position:fixed; right:clamp(1.5rem,5vw,4rem); bottom:clamp(1.5rem,5vw,3rem); display:flex; gap:2em; font-size:.8rem; letter-spacing:.25em; }
  nav.bottom a { color:var(--ink-dim); text-decoration:none; transition:color .4s; }
  nav.bottom a:hover { color:var(--ink); }
  @media (prefers-reduced-motion:reduce){ .poem p{animation:none;opacity:1;transform:none;} }
</style>
</head>
<body>
  <canvas id="c" aria-hidden="true"></canvas>
  <nav class="top"><a href="../index.html" title="間 のトップへ">間</a></nav>

  <div class="poem" role="article" aria-label="粉雪">
    <div class="title">第五作　粉雪</div>
    <p>降りていいのか、まだ迷っている。</p>
    <p>風にすこし、上へ戻ったりして。</p>
    <p>それでも、いつかは下にたどり着く。</p>
    <p>雪は、急ぐことを知らない。</p>
  </div>

  <nav class="bottom">
    <a href="04-yonaka-no-kokyu.html">← 前の作品</a>
    <a href="../index.html">間 →</a>
  </nav>

<script>
/*
 * 粉雪 — 雪が、ためらいながら漂い落ちる。
 * まっすぐには降りない。風にすこし上へ戻ったり、宙でとまったりして、
 * それでも、いつかは下にたどり着く。急がない。雪は、急ぐことを知らない。
 * 下のすみに、遠い窓の小さなあかり。寒くても、まだ大丈夫だよ、と。
 */
(function(){
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let w,h,dpr,flakes=[];
  function resize(){ dpr=Math.min(devicePixelRatio||1,2);
    w=canvas.width=Math.floor(innerWidth*dpr); h=canvas.height=Math.floor(innerHeight*dpr);
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
    makeFlakes();
  }
  // 一片の雪をつくる。depth(0=遠い…1=近い)で、大きさ・速さ・濃さを変える。
  function newFlake(atTop){
    const depth=Math.random();
    return {
      x:Math.random()*w,
      y:atTop ? -20*dpr - Math.random()*h*0.3 : Math.random()*h,
      depth:depth,
      r:(0.7+depth*2.2)*dpr,                 // 近いほど大きい
      fall:(6+depth*16)*dpr,                 // 近いほど速い（それでもゆっくり）
      sway:(8+depth*22)*dpr,                 // 横ゆれの幅
      swayF:0.15+Math.random()*0.25,         // 横ゆれのはやさ
      hesF:0.25+Math.random()*0.4,           // ためらいの周期
      ph:Math.random()*Math.PI*2,
      ph2:Math.random()*Math.PI*2,
      alpha:0.25+depth*0.55
    };
  }
  function makeFlakes(){
    const n=Math.round((w*h)/(26000*dpr));
    flakes=[]; for(let i=0;i<n;i++) flakes.push(newFlake(false));
  }
  resize(); addEventListener('resize',resize);

  // 背景 — 夜のしずかな雪空。下のすみに、遠い窓のあたたかいあかり。
  function backdrop(){
    const sky=ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'rgba(14,18,28,0.6)'); sky.addColorStop(1,'rgba(8,9,14,0.6)');
    ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
    const wx=w*0.83, wy=h*0.86;
    const g=ctx.createRadialGradient(wx,wy,0,wx,wy,Math.max(w,h)*0.4);
    g.addColorStop(0,'rgba(255,210,150,0.07)'); g.addColorStop(1,'rgba(255,210,150,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  }

  const start=performance.now(); let last=start;
  function draw(now){
    const dt=Math.min((now-last)/1000,0.05); last=now;
    const t=(now-start)/1000;
    ctx.clearRect(0,0,w,h);
    backdrop();

    // ごくゆるい横風。これも、ゆっくり向きを変える。
    const wind=Math.sin(t*0.06)*4*dpr;

    for(const f of flakes){
      // ためらい：落ちる速さがゆれて、ときどき宙でとまり、わずかに上へ戻る
      const hes=0.45+0.75*Math.sin(t*f.hesF+f.ph);   // -0.3 〜 +1.2
      f.y += f.fall*hes*dt;
      f.x += (Math.cos(t*f.swayF+f.ph2)*f.sway*0.5 + wind*f.depth)*dt;

      // 下までたどり着いたら、また空のうえから
      if(f.y > h+20*dpr){ Object.assign(f,newFlake(true)); f.x=Math.random()*w; }
      if(f.x < -30*dpr) f.x=w+20*dpr; else if(f.x > w+30*dpr) f.x=-20*dpr;

      const tw=0.82+0.18*Math.sin(t*0.8+f.ph);       // ほのかな息づかい
      ctx.fillStyle=`rgba(238,242,251,${f.alpha*tw})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill();
    }

    if(!reduce) requestAnimationFrame(draw);
  }

  if(reduce){
    // 動きを止める設定なら、降る途中の雪を一枚だけ静かに置く
    ctx.clearRect(0,0,w,h); backdrop();
    for(const f of flakes){
      ctx.fillStyle=`rgba(238,242,251,${f.alpha})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill();
    }
  } else requestAnimationFrame(draw);
})();
</script>
</body>
</html>
